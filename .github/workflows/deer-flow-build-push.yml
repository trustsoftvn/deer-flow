  #   needs: [meta, build-backend, build-frontend]
  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Update kustomization image tags
  #       run: |
  #         SHA=$(echo "${{ github.sha }}" | cut -c1-7)
  #         cd k8s
  #         kustomize edit set image \
  #           ghcr.io/trustsoftvn/deer-flow-backend:latest=ghcr.io/${{ env.ORG }}/deer-flow-backend:sha-${SHA} \
  #           ghcr.io/trustsoftvn/deer-flow-frontend:latest=ghcr.io/${{ env.ORG }}/deer-flow-frontend:sha-${SHA}
  #     - name: Commit and push
  #       run: |
